# Local dev override — only spins up the DB on port 5433 to avoid
# conflicting with any locally-installed PostgreSQL on 5432.
# Usage: docker-compose -f docker-compose.dev.yml up -d

services:
  db:
    image: postgres:16-alpine
    container_name: aifitness_db
    environment:
      POSTGRES_DB: aifitness
      POSTGRES_USER: ${DATABASE_USER:-postgres}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-postgres}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data_dev:

